name = "mega-asistan-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# ─── Secrets ────────────────────────────────────────────────────────────────
# API key'i ASLA bu dosyaya yazma!
# Deploy öncesi şu komutla kaydet:
#   wrangler secret put GEMINI_API_KEY
#   → Prompt'a AIzaSy... yapıştır
# ────────────────────────────────────────────────────────────────────────────

[observability]
enabled = true

# Deploy sonrası çıkan URL'yi app-bundle.js içindeki PROXY_ENDPOINT'e yaz:
#   const PROXY_ENDPOINT = 'https://mega-asistan-proxy.KULLANICI.workers.dev';
# Aynı URL'yi HTML'deki CSP connect-src'a da ekle.
