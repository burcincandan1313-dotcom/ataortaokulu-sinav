name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            --user "GitHub Actions Bot <actions@github.com>" \
            --repo "https://git:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
